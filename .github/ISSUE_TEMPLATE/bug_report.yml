name: Bug report
description: Report a reproducible simulator or tooling problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For security-sensitive problems, use the private advisory link instead of a public issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug in one short paragraph.
      placeholder: The dynamic SINR timeline is empty when running the default profile.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact commands, inputs, and settings needed to reproduce the problem.
      placeholder: |
        1. Install dependencies with `pip install -r requirements.txt`
        2. Run `python -m cellular_uav_sir.main`
        3. Open `cellular_uav_sir/results/...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The run should generate both CSV tables and PNG figures.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The run exits with a traceback before writing the dynamic outputs.
    validations:
      required: true
  - type: textarea
    id: inputs
    attributes:
      label: Input files and profile
      description: Mention the profile JSON, site layout, building GeoJSON, antenna pattern, or other custom inputs involved.
      placeholder: default_parameter_profile.json + real_site_layout_knoxville_tn.csv
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and how you installed dependencies.
      placeholder: Windows 11, Python 3.12, pip install -r requirements.txt
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste the traceback or attach relevant screenshots.
      render: shell
