name: Documentation request
description: Report a missing, inaccurate, or unclear documentation area.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: gap
    attributes:
      label: Documentation gap
      description: What is missing, incorrect, or hard to follow?
      placeholder: The README explains the public-data pipeline, but it does not clarify which outputs are intermediate versus final deliverables.
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Intended audience
      description: Who is blocked by this gap?
      placeholder: First-time users running the simulator on public site-layout data.
    validations:
      required: true
  - type: textarea
    id: suggested_update
    attributes:
      label: Suggested update
      description: If you already know the best place for the change, mention it here.
      placeholder: Add a short subsection to the wiki Outputs page and link it from the README.
