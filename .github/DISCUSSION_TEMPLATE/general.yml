title: "[General] "
body:
  - type: textarea
    id: topic
    attributes:
      label: Topic
      description: What do you want to discuss?
      placeholder: I want to compare this simulator's assumptions against another reuse-planning workflow.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Share background, links, commands, or screenshots that help frame the discussion.
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What kind of answer or decision would make this discussion useful?
