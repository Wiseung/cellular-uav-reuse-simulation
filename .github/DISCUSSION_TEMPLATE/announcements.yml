title: "[Announcement] "
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the update in a few sentences.
      placeholder: CodeQL, security reporting, and community templates are now enabled for this repository.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Who is affected
      description: Explain who should pay attention and why.
      placeholder: Contributors opening issues or testing the public-data pipeline.
  - type: textarea
    id: action
    attributes:
      label: Action items
      description: Note any follow-up steps contributors should take.
      placeholder: Use the new issue forms and route questions to the Q&A category.
